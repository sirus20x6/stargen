name: CI

on:
  push:
  pull_request:

# Auto-cancel superseded runs of this workflow on the same ref. Without it,
# every push + pull_request across the stacked kanban branches piled up with no
# way to clear, and the redundant runs starved the free-tier runner pool (jobs
# sat queued for over an hour behind builds for commits that no longer mattered).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        compiler:
          # The clang lane uses clang-21 from apt.llvm.org (newer than the
          # Ubuntu default clang-18) for current C++23 support. Note: clang's
          # optimizer hangs effectively forever ("Build stargen" stuck 50+ min,
          # even at -j1, vs ~5 min for gcc) on the huge predefined star-catalogue
          # initializers -- ring_universe.cpp et al., tens of thousands of
          # mass(abs2luminosity(...)) calls in one dynamic initializer. That is
          # worked around per-file in CMakeLists.txt (-O0 for those data TUs
          # under clang); gcc is unaffected. `jobs` caps build parallelism.
          - { name: gcc, cc: gcc-14, cxx: g++-14, jobs: 2 }
          - { name: clang, cc: clang-21, cxx: clang++-21, jobs: 2 }

    name: build-and-test (${{ matrix.compiler.name }})

    env:
      CC: ${{ matrix.compiler.cc }}
      CXX: ${{ matrix.compiler.cxx }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build cmake
          if [ "${{ matrix.compiler.name }}" = "clang" ]; then
            # clang-21 is not in the Ubuntu apt repos; pull it from apt.llvm.org.
            # clang-tools-21 provides clang-scan-deps-21, which CMake needs to
            # scan the C++23 module dependency graph for the clang build.
            wget -qO llvm.sh https://apt.llvm.org/llvm.sh
            chmod +x llvm.sh
            sudo ./llvm.sh 21
            sudo apt-get install -y clang-tools-21
          else
            sudo apt-get install -y ${{ matrix.compiler.cxx }}
          fi

      # The `viewer` target needs raylib (GLFW + a display backend) at configure
      # time and is unrelated to the generator; keep it out of CI entirely.
      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DSTARGEN_BUILD_VIEWER=OFF

      # NOTE: build only the specific targets. The `viewer` target is currently
      # broken, so a bare full build would make CI red.
      - name: Build stargen
        run: cmake --build build --target stargen -j ${{ matrix.compiler.jobs }}

      - name: Build stargen_tests
        run: cmake --build build --target stargen_tests -j ${{ matrix.compiler.jobs }}

      # Skip local-only tests (golden_regression): they byte-compare ~20-sig-fig
      # FP output and only match the toolchain that produced the goldens. They
      # still run locally via verify.sh and the pre-commit hook.
      - name: Test
        run: ctest --test-dir build --output-on-failure --label-exclude local-only
