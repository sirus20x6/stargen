name: Release

# Tag-only: this workflow just builds + packages a release artifact when a
# v* tag is pushed. Ordinary push/PR validation lives in ci.yml (which would
# otherwise duplicate this build on every commit).
on:
  push:
    tags: [ "v*" ]

env:
  BUILD_TYPE: Release

jobs:
  build-and-package:
    runs-on: ubuntu-latest
    container: gcc:16   # GCC 16 / C++26 (matches ci.yml); reflection needs it
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: |
          apt-get update
          apt-get install -y --no-install-recommends cmake ninja-build

      - name: Configure CMake
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} -DSTARGEN_BUILD_VIEWER=OFF

      # Build only the shipped targets; the `viewer` is gated off above.
      - name: Build
        run: |
          cmake --build build --target stargen -j 2
          cmake --build build --target stargen_tests -j 2

      - name: Test
        # Skip local-only tests (golden_regression) — non-portable FP goldens; see ci.yml.
        run: ctest --test-dir build --output-on-failure --label-exclude local-only

      - name: Package
        run: tar -czvf stargen.tar.gz -C build .

      - uses: actions/upload-artifact@v4
        with:
          name: stargen-linux.tar.gz
          path: stargen.tar.gz

  # Runs only on tag pushes. NOTE: still uses the deprecated
  # actions/create-release@v1 + download-artifact@v3; they would need replacing
  # to actually cut a release, but only fire on the rare tag push.
  create-release:
    needs: build-and-package
    runs-on: ubuntu-latest
    steps:
    - uses: actions/download-artifact@v3
      with:
        name: stargen-linux.tar.gz

    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.run_number }}
        release_name: Release ${{ github.run_number }}
        draft: false
        prerelease: false

    - name: Upload Release Asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./stargen.tar.gz
        asset_name: stargen-linux.tar.gz
        asset_content_type: application/gzip
