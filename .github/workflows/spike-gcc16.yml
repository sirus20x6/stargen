name: spike-gcc16
on:
  push:
    branches: [ kanban/cpp26-reflection-output ]
jobs:
  ppa:
    runs-on: ubuntu-latest
    steps:
      - name: Try PPA gcc-16
        run: |
          sudo apt-get update
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test || true
          sudo apt-get update || true
          echo "=== apt-cache policy g++-16 ==="; apt-cache policy g++-16 || true
          if sudo apt-get install -y g++-16; then echo "PPA_GCC16=OK"; g++-16 --version | head -1; else echo "PPA_GCC16=UNAVAILABLE"; fi
  container:
    runs-on: ubuntu-latest
    container: gcc:16
    steps:
      - name: Check gcc:16 container
        run: |
          echo "=== container g++ ==="; g++ --version | head -1
          echo "=== tools present? ==="; (cmake --version | head -1) || echo "NO cmake"; (ninja --version) || echo "NO ninja"; (git --version) || echo "NO git"
          echo "CONTAINER_GCC16=OK"
